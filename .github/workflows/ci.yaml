name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  # Validation on every push/PR. camas is the single source of truth: `ci` = npm ci + the full
  # parallel validation (rustfmt, clippy -D warnings, test, doc; prettier, eslint, tsc).
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v5
      - run: uvx camas ci

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Build + test on the declared rust-version
        run: cargo test --all-features

  # RUSTSEC advisory scan — its own parallel job (needs the cargo-audit binary).
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - uses: astral-sh/setup-uv@v5
      - run: uvx camas audit

  # Mutation testing — proves the tests actually bite. Its own parallel job (the slow one), and
  # advisory: a surviving mutant is a quality signal to investigate, not a hard release blocker
  # (forcing 100% on defensive helpers breeds contrived tests).
  mutants:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - uses: astral-sh/setup-uv@v5
      - run: uvx camas mutants

  # Release jobs run only for v* tags, after validation passes.
  binaries:
    needs: [validate, msrv]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          bin=cfmt
          [ "${{ matrix.os }}" = "windows-latest" ] && bin=cfmt.exe
          tar -czf "cfmt-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" "$bin"
      - uses: softprops/action-gh-release@v2
        with:
          files: cfmt-${{ matrix.target }}.tar.gz

  crate:
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: cargo publish

  extension:
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      - name: Package .vsix
        run: npx --yes @vscode/vsce package
      - uses: softprops/action-gh-release@v2
        with:
          files: editors/vscode/*.vsix
      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish
