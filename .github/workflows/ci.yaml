on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  # Validation on every push/PR. camas is the single source of truth: `ci` = npm ci + the full
  # parallel validation (rustfmt, clippy -D warnings, test, doc; prettier, eslint, tsc).
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v8
      - run: uvx camas ci

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
      - run: cargo test --all-features

  # RUSTSEC advisory scan — its own parallel job (needs the cargo-audit binary).
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - uses: astral-sh/setup-uv@v8
      - run: uvx camas audit

  # Build release binaries on every push/PR to catch breakage early.
  # Uploaded as CI artifacts (raw binary); promoted to the release page only on v* tags.
  binaries:
    needs: [validate, msrv]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}

      - id: bin
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "name=cfmt.exe" >> "$GITHUB_OUTPUT"
          else
            echo "name=cfmt" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: cfmt-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ steps.bin.outputs.name }}

      - if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          ext=""
          [ "${{ matrix.os }}" = "windows-latest" ] && ext=".exe"
          cp "target/${{ matrix.target }}/release/${{ steps.bin.outputs.name }}" "cfmt-${{ matrix.target }}$ext"

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: cfmt-${{ matrix.target }}*

  crate:
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: cargo publish

  extension:
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      - run: npx --yes @vscode/vsce package
      - uses: softprops/action-gh-release@v3
        with:
          files: editors/vscode/*.vsix
      - env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish
