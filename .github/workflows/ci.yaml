name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  # Validation on every push/PR. camas is the single source of truth: bare `camas` runs its
  # `github_task` (defined in tasks.py's Config — the workflow never names tasks), from inside the
  # Nix dev shell that provides node, uv, nix, and the extension's node_modules (built hermetically
  # from package-lock.json by importNpmLock — no npm ci). That task is the full parallel validation:
  # the Rust checks are crane-backed `nix run` apps (fmt, clippy -D warnings, test on stable + MSRV,
  # doc, RUSTSEC audit); plus prettier, eslint, tsc, knip, typos, and nixfmt.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: nixbuild/nix-quick-install-action@v35
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - run: nix develop --command camas

  # Build release binaries on every push/PR to catch breakage early.
  # Uploaded as CI artifacts (raw binary); promoted to the release page only on v* tags.
  binaries:
    needs: validate
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}

      - id: bin
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "name=jphfmt.exe" >> "$GITHUB_OUTPUT"
          else
            echo "name=jphfmt" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: jphfmt-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ steps.bin.outputs.name }}

      - if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          ext=""
          [ "${{ matrix.os }}" = "windows-latest" ] && ext=".exe"
          cp "target/${{ matrix.target }}/release/${{ steps.bin.outputs.name }}" "jphfmt-${{ matrix.target }}$ext"

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: jphfmt-${{ matrix.target }}*

  crate:
    needs: [binaries, validate]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: cargo publish

  extension:
    needs: [binaries, validate]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      - run: npx --yes @vscode/vsce package
      - uses: softprops/action-gh-release@v3
        with:
          files: editors/vscode/*.vsix
      - env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish
