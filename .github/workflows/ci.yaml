on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  # Validation on every push/PR. camas is the single source of truth: `ci` = npm ci + the full
  # parallel validation (rustfmt, clippy -D warnings, test, doc; prettier, eslint, tsc).
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: |
          msrv=$(grep -oP 'rust-version\s*=\s*"\K[^"]+' Cargo.toml)
          rustup toolchain install "$msrv" --profile minimal
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uvx camas

  # RUSTSEC advisory scan — its own parallel job (needs the cargo-audit binary).
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uvx camas audit

  # Build release binaries on every push/PR to catch breakage early.
  # Uploaded as CI artifacts (raw binary); promoted to the release page only on v* tags.
  binaries:
    needs: validate
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}

      - id: bin
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "name=jphfmt.exe" >> "$GITHUB_OUTPUT"
          else
            echo "name=jphfmt" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: jphfmt-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ steps.bin.outputs.name }}

      - if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          ext=""
          [ "${{ matrix.os }}" = "windows-latest" ] && ext=".exe"
          cp "target/${{ matrix.target }}/release/${{ steps.bin.outputs.name }}" "jphfmt-${{ matrix.target }}$ext"

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: jphfmt-${{ matrix.target }}*

  # DeepSeek code review — runs after validation on PRs only, feeding test output as context.
  deepseek-review:
    needs: validate
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: dtolnay/rust-toolchain@stable

      - id: test-output
        run: cargo test --all-features 2>&1 | tail -150 | tee test-summary.txt

      - id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # 1. Full codebase snapshot (source files with path markers)
          codebase="$(
            for f in $(find src tests -name '*.rs' -o -name '*.toml' | sort); do
              echo "=== $f ==="
              cat "$f"
              echo ""
            done
          )"

          # 2. PR diff
          diff="$(gh pr diff "$PR_NUMBER" --repo "$REPO")"

          # 3. Test results
          test_output="$(cat test-summary.txt)"

          system_prompt='You are providing a comprehensive code review for this pull request. You are given the full codebase, the PR diff, and CI test results. Categorize your findings by priority level.'

          user_prompt="## Full Codebase (pre-PR)\n\n$codebase\n\n## PR Diff\n\n$diff\n\n## CI Test Results\n\n\`\`\`\n$test_output\n\`\`\`\n\nReport findings as a bullet list. Reference file paths and line numbers."

          body="$(jq -n \
            --arg model deepseek-v4-pro \
            --arg temperature 0.2 \
            --arg system "$system_prompt" \
            --arg user "$user_prompt" \
            '{model: $model, temperature: ($temperature | tonumber), messages: [{role: "system", content: $system}, {role: "user", content: $user}]}')"

          response="$(curl -sS --max-time 300 \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$body" \
            https://api.deepseek.com/chat/completions)"

          comment="$(printf '%s' "$response" | jq -r '.choices[0].message.content // empty')"
          if [ -n "$comment" ] && [ "$comment" != "null" ]; then
            printf '%s' "$comment" | gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file -
          fi

  crate:
    needs: [binaries, audit]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: cargo publish

  extension:
    needs: [binaries, audit]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      - run: npx --yes @vscode/vsce package
      - uses: softprops/action-gh-release@v3
        with:
          files: editors/vscode/*.vsix
      - env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish
