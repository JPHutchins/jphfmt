name: hr-fix-probe

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  control-official:
    runs-on: ubuntu-latest
    steps:
      - name: Arm egress (official harden-runner v2.20.0)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
      - name: Canary
        run: |
          if curl -sS --max-time 12 -o /dev/null https://example.com; then
            echo "RESULT control-official: LEAK (fail-open — block did not engage)"
          else
            echo "RESULT control-official: BLOCKED (block held)"
          fi

  fixed-fork:
    runs-on: ubuntu-latest
    steps:
      - name: Arm egress (fixed fork)
        uses: JPHutchins/harden-runner@ee143ec9798e02c7b6f70d1bb39864121a71345d
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
      - name: Canary
        run: |
          if curl -sS --max-time 12 -o /dev/null https://example.com; then
            echo "RESULT fixed-fork: LEAK (fail-open — block did not engage)"
          else
            echo "RESULT fixed-fork: BLOCKED (block held — FIX WORKS)"
          fi
