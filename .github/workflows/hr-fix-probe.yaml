name: hr-fix-probe

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  official:
    strategy:
      fail-fast: false
      matrix:
        i: [1, 2, 3, 4, 5, 6]
    runs-on: ubuntu-latest
    steps:
      - name: Arm egress (official harden-runner v2.20.0)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
      - name: Canary
        run: |
          if curl -sS --max-time 12 -o /dev/null https://example.com; then
            echo "RESULT official#${{ matrix.i }}: LEAK (fail-open — block did not engage)"
          else
            echo "RESULT official#${{ matrix.i }}: BLOCKED"
          fi

  fork:
    strategy:
      fail-fast: false
      matrix:
        i: [1, 2, 3, 4, 5, 6]
    runs-on: ubuntu-latest
    steps:
      - name: Arm egress (fixed fork)
        uses: JPHutchins/harden-runner@ee143ec9798e02c7b6f70d1bb39864121a71345d
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
      - name: Canary
        run: |
          if curl -sS --max-time 12 -o /dev/null https://example.com; then
            echo "RESULT fork#${{ matrix.i }}: LEAK (fail-open — block did not engage)"
          else
            echo "RESULT fork#${{ matrix.i }}: BLOCKED"
          fi
