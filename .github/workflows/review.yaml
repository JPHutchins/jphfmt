# Code review — thin consumer of the code-review reusable workflow.
# The full pipeline lives in the pinned ref; this repo keeps only the trigger, the superset
# permissions, the MODEL_API_KEY secret, and .github/prices.json. Bump the @ref to upgrade.
# See: https://github.com/JPHutchins/code-review

name: Code review

on:
  workflow_run:
    workflows: ["CI"]       # our CI workflow name — unmodified
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.conclusion == 'success' ||
       github.event.workflow_run.conclusion == 'failure')
    uses: JPHutchins/code-review/.github/workflows/review-reusable.yaml@v0.1.0-alpha.15
    with:
      head_sha:      ${{ github.event.workflow_run.head_sha }}
      head_branch:   ${{ github.event.workflow_run.head_branch }}
      head_repo:     ${{ github.event.workflow_run.head_repository.full_name }}
      run_id:        ${{ github.event.workflow_run.id }}
      conclusion:    ${{ github.event.workflow_run.conclusion }}
      trigger_event: ${{ github.event.workflow_run.event }}
      api_base_url:  ${{ vars.API_BASE_URL }}
      # Check-running via Nix (the CI dev shell: node, uv, rust/crane, etc.). setup: nix installs the
      # Nix binary; install_command warms the dev shell OUTSIDE the agent's wall so the agent's own
      # `nix develop --command …` validations are fast. egress_policy: audit for now — it discovers the
      # real host set (cache.nixos.org, crates.io, …) without blocking; harden to block + pinned
      # extra_endpoints once discovered (JPHutchins/code-review#33).
      setup: nix
      install_command: nix develop --command true
      egress_policy: audit
      mechanic_wall: 3m
      mechanic_hard_kill: 4m
      full_wall: 10m
      full_hard_kill: 13m
    secrets:
      MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
