# Code review — thin consumer of the code-review reusable workflow.
# The full pipeline lives in the pinned ref; this repo keeps only the trigger, the superset
# permissions, the MODEL_API_KEY secret, .github/prices.json, and its OWN check-running setup
# (.github/actions/code-review-setup — Nix toolchain + cache, invoked via use_setup_action).
# Bump the @ref to upgrade. See: https://github.com/JPHutchins/code-review

name: Code review

on:
  workflow_run:
    workflows: ["CI"]       # our CI workflow name — unmodified
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.conclusion == 'success' ||
       github.event.workflow_run.conclusion == 'failure')
    uses: JPHutchins/code-review/.github/workflows/review-reusable.yaml@v0.1.0-alpha.22
    with:
      head_sha:      ${{ github.event.workflow_run.head_sha }}
      head_branch:   ${{ github.event.workflow_run.head_branch }}
      head_repo:     ${{ github.event.workflow_run.head_repository.full_name }}
      run_id:        ${{ github.event.workflow_run.id }}
      conclusion:    ${{ github.event.workflow_run.conclusion }}
      trigger_event: ${{ github.event.workflow_run.event }}
      api_base_url:  ${{ vars.API_BASE_URL }}
      # Check-running via our own Nix composite at .github/actions/code-review-setup.
      # Egress locked to block. extra_endpoints are the hosts an audit pass observed beyond the
      # workflow's baked-in set: the Nix installer's release assets, git tarball downloads, the cargo
      # registry (index + crate downloads), and the Nix binary cache (defensive — a store-cache HIT
      # masks it, but a cache miss fetches from it). alpha.19's egress canary fails the job closed if
      # harden-runner silently drops this back to audit (step-security/harden-runner#675).
      use_setup_action: true
      egress_policy: block
      extra_endpoints: >-
        release-assets.githubusercontent.com:443
        codeload.github.com:443
        index.crates.io:443
        static.crates.io:443
        cache.nixos.org:443
      mechanic_wall: 3m
      mechanic_hard_kill: 4.5m
      full_wall: 10m
      full_hard_kill: 15m
    secrets:
      MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
